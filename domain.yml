version: "3.1"

entities:
  - nome
  - servico

slots:
  nome:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: nome
  
  servico:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: servico

actions:
  - action_compreende_modulo
  
intents:
  - saudacao
  - informar_nome
  - agradecimento
  - opcao_modulo
  - escolher_modulo_patologico
  - escolher_modulo_similares
  - escolher_modulo_laudo
  - ajuda
  - fora_de_escopo
  - fechamento_atendimento
  - continuacao_atendimento

responses:
  utter_saudacao:
    - text: "Olá! Sou o ChatRAD, um chatbot para avaliar radiografias."

  utter_informar_nome:
    - text: "Olá, {nome}. Sou o ChatRAD, um chatbot para avaliar radiografias."

  utter_opcao_modulo:
    - text: "Para que eu possa te ajudar agora, escolha o que deseja fazer:"
      buttons:
      - title: "📝 Gerar Laudo"
        payload: '/escolher_modulo_laudo{"servico": "laudo"}'
      - title: "🔍 Encontrar achados patológicos"
        payload: '/escolher_modulo_patologico{"servico": "patologico"}'
      - title: "📂 Encontrar exames similares"
        payload: '/escolher_modulo_similares{"servico": "similar"}'
      - title: "❓Ajuda/Como Usar"
        payload: '/ajuda{"servico": "ajuda"}'
  

  utter_agradecimento:
      - text: "Disponha! Fico feliz em ajudar. Gostaria de analisar outro exame?"
  
  utter_default: 
      - text: "Ops! Não consegui processar essa informação. 😅"
  
  utter_fora_de_escopo:
      - text: "Infelizmente, não consigo te ajudar com esse assunto. Eu sou um assistente focado em radiologia torácica. 😅"
  
  utter_fechamento_atendimento:
      - text: "Ok, estarei aqui para ajudar quando precisar 🙋."
  
  utter_continuacao_atendimento:
      - text: "Para continuarmos o atendimento, selecione um botão abaixo:"


  


session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
