version: "3.1"

# #Resposta que o bot deve dar de acordo com a intent identificada
rules:
  - rule: disparar action sempre que um módulo for escolhido
    steps:
      - intent: ajuda  # Captura o clique no botão de ajuda
      - action: action_compreende_modulo

  - rule: disparar para laudo
    steps:
      - intent: escolher_modulo_laudo
      - action: action_compreende_modulo

  - rule: disparar para similares
    steps:
      - intent: escolher_modulo_similares
      - action: action_compreende_modulo
      
  - rule: disparar para patologico
    steps:
      - intent: escolher_modulo_patologico
      - action: action_compreende_modulo
    
  - rule: nao entendeu nada
    steps:
      - intent: nlu_fallback
      - action: utter_default
      - action: utter_opcao_modulo
  
  - rule: fora de escopo 
    steps:
      - intent: fora_de_escopo
      - action: utter_fora_de_escopo
      - action: utter_opcao_modulo
