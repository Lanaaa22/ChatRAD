version: "3.1"
#arquivo que armazena os exemplos para treinar o rasa com as intenções
nlu:

- regex: nome
  examples: |
    - (?<=me chamo\s)[A-Za-zÀ-ÖØ-öø-ÿ]+
    
- intent: escolher_modulo_patologico
  examples: |
    - achados patológicos
    - patológico
    - quero análise patológica
    - módulo patológico

- intent: escolher_modulo_radiografia
  examples: |
    - relatórios de radiografias
    - radiografia
    - raio x
    - módulo de radiografia

- intent: escolher_modulo_laudo
  examples: |
    - laudos médicos automáticos
    - laudo
    - gerar laudo
    - módulo de laudo

